<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Weather App</title>
        <style>
            #loading, #error, #empty {
                display: none;
            }
            #error {
                color: red;
            }
            #result-container {
                max-width: 500px;
                width: 100%;
            }
            #city-select {
                width: 200px;
                height: 40px;
                font-size: medium;
            }
            #search-btn {
                margin-bottom: 10px;
                width: 50px;
                height: 40px;
                background-color: rgb(2, 91, 94);
                border: none;
                border-radius: 3px;
                color: white;
            }
            .weather-card {
                border: 1px solid #ccc;
                border-radius: 8px;
                padding: 16px;
                text-align: center;
            }
            .forecast-wrapper {
                display: flex;
                justify-content: space-around;
                gap: 30px;
            }
        </style>
    </head>
    <body>
        <h1>お天気検索</h1>
        <form id="weather-form">
            <select name="city" id="city-select">
                <option value="">都市を選択</option>
            </select>

            <button id="search-btn" type="submit">検索</button>
        </form>
        <div id="loading">読み込み中...</div>
        <div id="error">エラーが発生しました。時間をおいて再読み込みしてください</div>
        <div id="empty">指定地域のデータが見つかりませんでした。</div>
        <div id="result-container"></div>

        <script src="app.js"></script>
    </body>
</html>
